<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Petualangan Mario - 100 Level</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      height: 100%;
      width: 100%;
      font-family: 'Arial', sans-serif;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    .footer {
      position: fixed;
      bottom: 4px;
      left: 0;
      right: 0;
      font-size: 11px;
      color: #555;
      text-align: center;
      pointer-events: none;
    }
    .controls-hint { display: none; }
    @media (min-width: 900px) and (hover: hover) {
      .controls-hint {
        display: block;
        position: fixed;
        bottom: 22px;
        left: 0;
        right: 0;
        font-size: 11px;
        color: #555;
        text-align: center;
        pointer-events: none;
      }
      .footer { bottom: 4px; }
    }
    kbd {
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div class="footer">Petualangan Mario v5 - 100 Level &middot; Phaser 3.60</div>
  <div class="controls-hint">
    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> / <kbd>A</kbd> <kbd>D</kbd> Gerak &middot;
    <kbd>Space</kbd> Lompat &middot;
    <kbd>P</kbd> Pause &middot;
    <kbd>R</kbd> Restart &middot;
    <kbd>M</kbd> Mute
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js?v=5"></script>
</body>
</html>
