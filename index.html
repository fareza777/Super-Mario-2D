<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Petualangan Mario - 100 Level</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      height: 100%;
      font-family: 'Arial', sans-serif;
      overscroll-behavior: none;
      touch-action: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
      flex-direction: column;
    }
    #game-container {
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
      border-radius: 4px;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    .footer {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
    .controls-hint {
      margin-top: 6px;
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    kbd {
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div class="footer">Petualangan Mario - 100 Level &middot; Phaser 3.60 &middot; Capacitor Android</div>
  <div class="controls-hint">
    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> / <kbd>A</kbd> <kbd>D</kbd> Gerak &middot;
    <kbd>Space</kbd> Lompat &middot;
    <kbd>P</kbd> Pause &middot;
    <kbd>R</kbd> Restart &middot;
    <kbd>M</kbd> Mute
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js?v=2"></script>
</body>
</html>
