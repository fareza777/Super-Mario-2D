<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Petualangan Mario - 100 Level</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      height: 100%;
      width: 100%;
      font-family: 'Arial', sans-serif;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    #game-container {
      width: 100%;
      height: 100%;
      max-width: min(100vw, calc(100vh * 4 / 3));
      max-height: min(100vh, calc(100vw * 3 / 4));
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      touch-action: none;
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      border-radius: 4px;
    }
    .footer {
      position: fixed;
      bottom: 4px;
      left: 0;
      right: 0;
      font-size: 11px;
      color: #555;
      text-align: center;
      pointer-events: none;
      z-index: 1;
    }
    .controls-hint { display: none; }
    @media (min-width: 900px) and (hover: hover) {
      .controls-hint {
        display: block;
        position: fixed;
        bottom: 22px;
        left: 0;
        right: 0;
        font-size: 11px;
        color: #555;
        text-align: center;
        pointer-events: none;
        z-index: 1;
      }
      .footer { bottom: 4px; }
    }
    /* Mobile: rotate-to-landscape hint */
    .rotate-hint {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a1a;
      color: #fff;
      z-index: 9999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      font-family: Arial, sans-serif;
    }
    .rotate-hint .icon { font-size: 64px; margin-bottom: 16px; }
    .rotate-hint .title { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
    .rotate-hint .sub { font-size: 14px; color: #aaa; }
    @media (max-width: 600px) and (orientation: portrait) {
      .rotate-hint { display: flex; }
    }
    kbd {
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div class="footer">Petualangan Mario v8 - 100 Level &middot; Phaser 3.60</div>
  <div class="rotate-hint" id="rotate-hint">
    <div class="icon">📱↻</div>
    <div class="title">Putar HP ke Landscape</div>
    <div class="sub">Game ini lebih nyaman dimainkan dalam mode landscape.</div>
    <button id="rotate-skip" style="
      margin-top: 24px;
      padding: 12px 24px;
      font-size: 16px;
      background: #2196f3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      cursor: pointer;
    ">Lanjutkan Portrait</button>
  </div>
  <script>
    (function() {
      var skip = document.getElementById('rotate-skip');
      if (skip) {
        skip.addEventListener('click', function() {
          var hint = document.getElementById('rotate-hint');
          if (hint) hint.style.display = 'none';
        });
      }
    })();
  </script>
  <div class="controls-hint">
    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> / <kbd>A</kbd> <kbd>D</kbd> Gerak &middot;
    <kbd>Space</kbd> Lompat &middot;
    <kbd>P</kbd> Pause &middot;
    <kbd>R</kbd> Restart &middot;
    <kbd>M</kbd> Mute
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js?v=8"></script>
</body>
</html>
